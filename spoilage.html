<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spoilage / Write-off · BV Yard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="pageContent">
    <div class="card mb-16" style="background:#fef9e7;border-color:#fbe5b6;">
      <div class="bold" style="color:#92400e;">Why this page exists</div>
      <div class="text-sm" style="color:#92400e;">Record stock losses (spoilage, damage, expiry, theft) or surplus adjustments. All records require Group OiC approval before stock is adjusted.</div>
    </div>

    <div id="pendingCard" style="display:none;" class="card mb-16">
      <div class="card-header"><h3 style="color:var(--warn);">Pending Approval</h3></div>
      <div class="table-wrap"><table class="data" id="pendingTbl"></table></div>
    </div>

    <div id="rejectedCard" style="display:none;" class="card mb-16">
      <div class="card-header"><h3 style="color:var(--danger);">Rejected Records</h3></div>
      <div class="table-wrap"><table class="data" id="rejectedTbl"></table></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="row" style="gap:12px;">
          <h3>Approved Adjustments</h3>
          <select id="filterType" style="border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:13px;">
            <option value="">All types</option>
            <option value="spoilage">Spoilage</option>
            <option value="damage">Damage</option>
            <option value="expired">Expired</option>
            <option value="theft">Theft</option>
            <option value="surplus">Surplus</option>
            <option value="misc">Misc</option>
          </select>
        </div>
        <button class="btn btn-primary" id="newBtn">+ Record Adjustment</button>
      </div>
      <div class="table-wrap"><table class="data" id="tbl"></table></div>
    </div>
  </div>

  <script src="assets/js/seed.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    renderShell('spoilage', 'Spoilage / Write-off', 'Reconcile inventory · all adjustments require Group OiC approval');

    const TYPES = ['spoilage', 'damage', 'expired', 'theft', 'surplus', 'misc'];

    function refresh() {
      const f = document.getElementById('filterType').value;
      const allRecords = DB.list('spoilage');
      const pending = allRecords.filter(r => r.status === 'pending_approval');
      const rejected = allRecords.filter(r => r.status === 'rejected');
      let approved = allRecords.filter(r => r.status === 'approved');
      if (f) approved = approved.filter(r => r.reason === f);

      const pendingCard = document.getElementById('pendingCard');
      pendingCard.style.display = pending.length ? '' : 'none';

      const rejectedCard = document.getElementById('rejectedCard');
      rejectedCard.style.display = rejected.length ? '' : 'none';
      document.getElementById('rejectedTbl').innerHTML = `
        <thead><tr>
          <th>Date</th><th>Item</th><th class="text-right">Qty</th><th>Type</th><th>Notes</th><th>Recorded By</th><th>Rejected By</th>
        </tr></thead>
        <tbody>
          ${rejected.slice().reverse().map(r => {
            const p = DB.product(r.productId);
            const u = DB.user(r.recordedBy);
            const rb = DB.user(r.rejectedBy);
            const isSurplus = r.reason === 'surplus';
            return `<tr style="opacity:0.7;">
              <td>${fmtDate(r.date)}</td>
              <td class="bold">${p ? escapeHtml(displayName(p)) : '—'}</td>
              <td class="text-right" style="color:var(--muted);font-weight:600;">${isSurplus?'+':'−'}${r.qty} ${p?.baseUnit||''}</td>
              <td><span class="badge">${r.reason.toUpperCase()}</span></td>
              <td class="text-sm text-mute">${escapeHtml(r.notes||'—')}</td>
              <td class="text-sm">${u ? u.name : '—'}</td>
              <td class="text-sm" style="color:var(--danger);">${rb ? rb.name : '—'}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="7" class="empty">No rejected records.</td></tr>'}
        </tbody>
      `;

      document.getElementById('pendingTbl').innerHTML = `
        <thead><tr>
          <th>Date</th><th>Item</th><th class="text-right">Qty</th><th>Type</th><th>Notes</th><th>Recorded By</th><th></th>
        </tr></thead>
        <tbody>
          ${pending.slice().reverse().map(r => {
            const p = DB.product(r.productId);
            const u = DB.user(r.recordedBy);
            const isSurplus = r.reason === 'surplus';
            return `<tr style="background:#fffbeb;">
              <td>${fmtDate(r.date)}</td>
              <td class="bold">${p ? escapeHtml(displayName(p)) : '—'}</td>
              <td class="text-right" style="color:${isSurplus?'var(--ok)':'var(--danger)'};font-weight:600;">${isSurplus?'+':'−'}${r.qty} ${p?.baseUnit||''}</td>
              <td><span class="badge warn">${r.reason.toUpperCase()}</span></td>
              <td class="text-sm text-mute">${escapeHtml(r.notes||'—')}</td>
              <td class="text-sm">${u ? u.name : '—'}</td>
              <td class="text-right">
                ${can('approveSpoilage') ? `
                  <button class="btn btn-sm btn-primary" onclick="approveRecord('${r.id}')">Approve</button>
                  <button class="btn btn-sm btn-danger" onclick="rejectRecord('${r.id}')">Reject</button>
                ` : '<span class="badge warn" style="font-size:10px;">AWAITING</span>'}
              </td>
            </tr>`;
          }).join('') || '<tr><td colspan="7" class="empty">No pending approvals.</td></tr>'}
        </tbody>
      `;

      document.getElementById('tbl').innerHTML = `
        <thead><tr>
          <th>Date</th><th>Item</th><th>Category</th><th class="text-right">Qty Adjusted</th>
          <th>Type</th><th>Notes</th><th>Recorded By</th><th>Approved By</th>
        </tr></thead>
        <tbody>
          ${approved.slice().reverse().map(r => {
            const p = DB.product(r.productId);
            const cat = p ? DB.category(p.categoryId) : null;
            const u = DB.user(r.recordedBy);
            const ap = DB.user(r.approvedBy);
            const isSurplus = r.reason === 'surplus';
            return `<tr>
              <td>${fmtDate(r.date)}</td>
              <td class="bold">${p ? escapeHtml(displayName(p)) : '—'}</td>
              <td class="text-sm">${cat ? escapeHtml(cat.name) : '—'}</td>
              <td class="text-right" style="color:${isSurplus?'var(--ok)':'var(--danger)'};font-weight:600;">${isSurplus?'+':'−'}${r.qty} ${p?.baseUnit||''}</td>
              <td><span class="badge ${r.reason === 'theft' ? 'danger' : isSurplus ? 'ok' : 'warn'}">${r.reason.toUpperCase()}</span></td>
              <td class="text-sm text-mute">${escapeHtml(r.notes||'—')}</td>
              <td class="text-sm">${u ? u.name : '—'}</td>
              <td class="text-sm">${ap ? ap.name : '—'}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="8" class="empty">No approved adjustments yet.</td></tr>'}
        </tbody>
      `;
    }

    window.approveRecord = (id) => {
      if (!can('approveSpoilage')) return toast('Only Group OiC or Overall Coordinator can approve adjustments', 'warn');
      const r = DB.get('spoilage', id);
      if (!r) return;
      r.status = 'approved';
      r.approvedBy = Session.get()?.id;
      r.approvedAt = new Date().toISOString();
      DB.upsert('spoilage', r);
      const delta = r.reason === 'surplus' ? r.qty : -r.qty;
      DB.adjustStock(r.productId, delta);
      const p = DB.product(r.productId);
      toast(`Approved — stock ${r.reason === 'surplus' ? 'increased' : 'reduced'} by ${r.qty} ${p?.baseUnit||''}`, 'ok');
      refresh();
    };

    window.rejectRecord = (id) => {
      if (!can('approveSpoilage')) return toast('Only Group OiC or Overall Coordinator can reject', 'warn');
      const r = DB.get('spoilage', id);
      if (!r || !confirm(`Reject this ${r.reason} record? No stock change will be made.`)) return;
      r.status = 'rejected';
      r.rejectedBy = Session.get()?.id;
      r.rejectedAt = new Date().toISOString();
      DB.upsert('spoilage', r);
      toast('Rejected — no stock change applied', 'warn');
      refresh();
    };

    function form() {
      const my = userSections();
      const prods = DB.productsForUser(my);
      return `
        <div class="form-grid">
          <div class="form-row">
            <div class="field"><label>Date</label><input id="f_date" type="date" value="${DB.today()}"></div>
            <div class="field"><label>Type <span class="req">*</span></label>
              <select id="f_reason">${TYPES.map(r => `<option value="${r}">${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}</select>
            </div>
          </div>
          <div class="field"><label>Item <span class="req">*</span></label>
            <select id="f_product">${prods.map(p => `<option value="${p.id}">${p.code} — ${escapeHtml(p.name)} (${p.currentStock} ${p.baseUnit} on hand)</option>`).join('')}</select>
          </div>
          <div class="field"><label>Quantity <span class="req">*</span></label>
            <input id="f_qty" type="number" min="1" placeholder="Enter quantity">
            <div class="text-sm text-mute" style="margin-top:4px;">Write-offs reduce stock · Surplus increases stock · Applied only after Group OiC approval.</div>
          </div>
          <div class="field"><label>Notes</label><textarea id="f_notes" rows="2" placeholder="e.g. Crate damaged in transit; or found extra stock during count"></textarea></div>
          <div class="text-sm" style="background:#f0f4ff;border-radius:6px;padding:10px;color:#374151;">
            This record will be submitted for Group OiC approval. Stock will only adjust after approval.
          </div>
        </div>
      `;
    }

    document.getElementById('newBtn').addEventListener('click', () => {
      if (!can('create')) return toast('Your role cannot record adjustments', 'warn');
      openModal('Record Stock Adjustment', form(), () => {
        const productId = document.getElementById('f_product').value;
        const qty = Number(document.getElementById('f_qty').value);
        const reason = document.getElementById('f_reason').value;
        const p = DB.product(productId);
        if (!productId || !qty) { toast('Item and qty required', 'danger'); return false; }
        DB.upsert('spoilage', {
          id: DB.uid('sp'),
          date: document.getElementById('f_date').value,
          productId, qty, reason,
          notes: document.getElementById('f_notes').value.trim(),
          recordedBy: Session.get()?.id,
          status: 'pending_approval'
        });
        toast('Submitted for Group OiC approval', 'ok');
        refresh();
      }, 'Submit for Approval');
    });

    document.getElementById('filterType').addEventListener('change', refresh);
    refresh();
  </script>
</body>
</html>
